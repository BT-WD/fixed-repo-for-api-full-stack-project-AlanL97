<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Full Stack Project</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <!-- You code goes here-->
     <h1>SEARCH COUNTRIES APP</h1>
     <section id="country-info">
      <div id="flag">
        <img src="https://flagpedia.net/data/flags/w580/us.webp">
      </div>
      <div class="country-facts">
        <p>
          United States of America<br>
          Capital: Washington, D.C.<br>
          Currencies: USD<br>
          etc.<br>
        </p>
      </div>
     </section>
     <section id="search-area">
      <div id="buttons">
        <button class="name-search">Search by Country Name</button>
        <button class="code-search">Search by Country Code</button>
        <button class="capital-search">Search by Capital City</button>
        <button class="demonym-search">Search by Demonym</button>
      </div>
      <input class="search-bar" type="search" placeholder="Search">
     </section>
  </body>
</html>
