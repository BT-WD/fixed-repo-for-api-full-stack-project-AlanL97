<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Full Stack Project</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>
  </head>
  <body>
    <!-- You code goes here-->
     <h1>SEARCH COUNTRIES APP</h1>
     <section id="country-info">
      <div id="flag">
      </div>
      <div class="country-facts" id="country-facts">
      </div>
     </section>
     <section id="search-area">
      <div id="buttons">
        <button class="name-search" id="name-search">Search by Country Name</button>
        <button class="code-search" id="code-search">Search by Country Code</button>
        <button class="capital-search" id="capital-search">Search by Capital City</button>
        <button class="demonym-search" id="demonym-search">Search by Demonym</button>
      </div>
      <input class="search-bar" id="search-bar" type="search" placeholder="Search">
     </section>
  </body>
</html>
